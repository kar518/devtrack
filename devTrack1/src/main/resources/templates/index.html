<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>DevTrack</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
        }

        input, select, button {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
        }

        ul {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        .analysis {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            padding: 15px;
            border-radius: 8px;
            width: 100px;
            text-align: center;
            font-weight: bold;
        }

        .easy { background: #d4edda; }
        .medium { background: #fff3cd; }
        .hard { background: #f8d7da; }

        .consistency {
            background: #e2e3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>DevTrack - Coding Skill Analyzer</h1>

<!-- Form -->
<form action="/add" method="post">
    <input type="text" name="title" placeholder="Problem Title" required>

    <input type="text" name="language" placeholder="Language" required>

    <select name="difficulty">
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
    </select>

    <input type="date" name="date" required>

    <button type="submit">Add Problem</button>
</form>

<hr>

<!-- Problem List -->
<h2>All Problems</h2>
<ul>
    <li th:each="p : ${problems}">
        <b th:text="${p.title}"></b> -
        <span th:text="${p.language}"></span> -
        <span th:text="${p.difficulty}"></span> -
        <span th:text="${p.date}"></span>
    </li>
</ul>

<hr>

<!-- Statistics -->
<h2>Statistics</h2>
<div class="stats">
    <div class="card easy">
        Easy
        <p th:text="${easyCount}"></p>
    </div>

    <div class="card medium">
        Medium
        <p th:text="${mediumCount}"></p>
    </div>

    <div class="card hard">
        Hard
        <p th:text="${hardCount}"></p>
    </div>
</div>

<hr>

<!-- Chart -->
<h2>Performance Chart</h2>
<canvas id="myChart" width="400" height="200"></canvas>

<hr>

<!-- Consistency Count -->
<div class="consistency">
    <h2>Consistency</h2>
    <p>Days Coded: <span th:text="${daysCoded}"></span></p>
</div>

<hr>

<!-- Calendar -->
<h2>Consistency Calendar</h2>
<div id="calendar" style="
    display: grid;
    grid-template-columns: repeat(7, 40px);
    gap: 6px;
    margin-top: 10px;
"></div>

<!-- AI Analysis -->
<div class="analysis">
    <h2>AI Analysis</h2>
    <p th:text="${analysis}"></p>
</div>

<!-- Chart Script -->
<script th:inline="javascript">
    var easy = /*[[${easyCount}]]*/ 0;
    var medium = /*[[${mediumCount}]]*/ 0;
    var hard = /*[[${hardCount}]]*/ 0;

    var ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Easy', 'Medium', 'Hard'],
            datasets: [{
                label: 'Problems Solved',
                data: [easy, medium, hard],
                borderWidth: 1
            }]
        }
    });
</script>

<!-- Calendar Script -->
<script th:inline="javascript">
    const dates = /*[[${allDates}]]*/ [];

    const calendar = document.getElementById("calendar");

    for (let i = 1; i <= 30; i++) {

        let day = i.toString().padStart(2, '0');
        let fullDate = "2026-03-" + day;

        let box = document.createElement("div");
        box.innerText = i;

        box.style.padding = "10px";
        box.style.textAlign = "center";
        box.style.borderRadius = "5px";

        if (dates.includes(fullDate)) {
            box.style.backgroundColor = "green";
            box.style.color = "white";
        } else {
            box.style.backgroundColor = "#ddd";
        }

        calendar.appendChild(box);
    }
</script>

</body>
</html>
